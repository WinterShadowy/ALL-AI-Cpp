<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI-Cpp参考文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
        /* 设置整体背景效果 */
        body {
            background-color: #f0f0f0; /* 背景颜色 */
            background-image: url('./img-background/bk-3.jpg'); /* 本地背景图片的路径 */
            background-size: cover; /* 使背景图片适应 */
            background-position: center; /* 背景图片居中 */
            background-attachment: fixed; /* 使背景图像固定 */
            color: #333; /* 设置字体颜色 */
            margin: 0; /* 去掉默认的边距 */
            height: 100vh; /* 设置 body 高度 */
        }

        /* 设置内容区的背景 */
        #app {
            background-color: rgba(255, 255, 255, 0.8); /* 半透明内容区背景 */
            max-height: 90vh; /* 设置最大高度为视口高度的90% */
            overflow-y: auto; /* 允许垂直滚动 */
            padding: 20px; /* 增加内边距 */
            border-radius: 8px; /* 圆边框 */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* 添加阴影 */
        }
    </style>

</head>
<body>
  <div id="app"></div>
  <style type="text/css">
    body {
      overflow: auto !important;
    }
  </style>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  
  <script>
    window.$docsify = {
      name: 'ALL-AI-Cpp',
      repo: '', // 可以加入 GitHub 仓库链接
      loadSidebar: true,
      sidebarCollapse: true,
      themeColor: '#3eaf7c' // 可加上自定义颜色
    }
  </script>
  
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
